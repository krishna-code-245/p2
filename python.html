<!DOCTYPE html>
<html>
<head>
    <title>USER DATA FORM</title>
</head>
<body>
    <h2>User Study Data</h2>

    <form onsubmit="saveData(event)">
        Name:
        <input type="text" id="username" required><br><br>

        Subject:
        <select id="subject" required>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="General Maths">General Maths</option>
        </select>
        <br><br>

        Class:
        <select id="classType" required>
            <option value="JEE">JEE</option>
            <option value="NEET">NEET</option>
        </select>
        <br><br>

        Daily study hours:
        <input type="number" id="hours" required><br><br>

        <input type="submit" value="Save">
    </form>

    <h3>Saved Data:</h3>
    <button onclick="loadData()">Load Saved Data</button>
    <button onclick="clearData()">Clear Data</button>

    <p id="output"></p>

    <script>
        function saveData(event) {
            event.preventDefault(); // stop page reload

            let data = {
                name: document.getElementById("username").value,
                subject: document.getElementById("subject").value,
                classType: document.getElementById("classType").value,
                hours: document.getElementById("hours").value
            };

            localStorage.setItem("studyData", JSON.stringify(data));
            alert("Data saved in browser!");
        }

        function loadData() {
            let saved = localStorage.getItem("studyData");

            if (saved) {
                let data = JSON.parse(saved);
                document.getElementById("output").innerHTML =
                    "Name: " + data.name + "<br>" +
                    "Subject: " + data.subject + "<br>" +
                    "Class: " + data.classType + "<br>" +
                    "Daily Study Hours: " + data.hours;
            } else {
                document.getElementById("output").innerHTML = "No data saved yet.";
            }
        }

        function clearData() {
            localStorage.removeItem("studyData");
            document.getElementById("output").innerHTML = "";
            alert("Data cleared!");
        }
    </script>
</body>
</html>
